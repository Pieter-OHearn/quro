services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quro}
      POSTGRES_DB: ${POSTGRES_DB:-quro}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-quro} -d ${POSTGRES_DB:-quro}']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-qurominio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-qurominio123}
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:9000/minio/health/live || exit 1']
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-qurominio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-qurominio123}
      S3_BUCKET: ${S3_BUCKET:-quro-documents}
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb -p "local/$$S3_BUCKET" || true
        mc anonymous set none "local/$$S3_BUCKET" || true
    restart: 'no'

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-quro}:${POSTGRES_PASSWORD:-quro}@db:5432/${POSTGRES_DB:-quro}
      PORT: '3000'
      CORS_ORIGIN: 'http://localhost:5173'
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-eu-west-1}
      S3_BUCKET: ${S3_BUCKET:-quro-documents}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-qurominio}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-qurominio123}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      PENSION_PARSER_URL: ${PENSION_PARSER_URL:-http://pension-parser:8080}
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      pension-parser:
        condition: service_started

  pension-import-worker:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    command: ['bun', 'run', 'src/workers/pensionImportWorker.ts']
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-quro}:${POSTGRES_PASSWORD:-quro}@db:5432/${POSTGRES_DB:-quro}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-eu-west-1}
      S3_BUCKET: ${S3_BUCKET:-quro-documents}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-qurominio}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-qurominio123}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      PENSION_PARSER_URL: ${PENSION_PARSER_URL:-http://pension-parser:8080}
      IMPORT_DRAFT_TTL_DAYS: ${IMPORT_DRAFT_TTL_DAYS:-7}
      IMPORT_WORKER_POLL_INTERVAL_MS: ${IMPORT_WORKER_POLL_INTERVAL_MS:-3000}
      PENSION_PARSER_TIMEOUT_MS: ${PENSION_PARSER_TIMEOUT_MS:-120000}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      pension-parser:
        condition: service_started

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - '11434:11434'
    volumes:
      - ollama-data:/root/.ollama

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_started
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
    entrypoint:
      - /bin/sh
      - -c
      - |
        ollama pull "$$OLLAMA_MODEL"
    restart: 'no'

  vllm:
    image: vllm/vllm-openai:latest
    restart: unless-stopped
    profiles: ['gpu']
    command:
      - --model
      - ${VLLM_MODEL:-Qwen/Qwen2.5-14B-Instruct-AWQ}
      - --host
      - 0.0.0.0
      - --port
      - '8000'
      - --gpu-memory-utilization
      - ${VLLM_GPU_MEMORY_UTILIZATION:-0.92}
      - --max-model-len
      - ${VLLM_MAX_MODEL_LEN:-8192}
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    ports:
      - '8000:8000'
    volumes:
      - vllm-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  pension-parser:
    build:
      context: .
      dockerfile: services/pension-parser/Dockerfile
    restart: unless-stopped
    environment:
      PARSER_LLM_BACKEND: ${PARSER_LLM_BACKEND:-ollama}
      PARSER_ALLOW_REGEX_FALLBACK: ${PARSER_ALLOW_REGEX_FALLBACK:-true}
      PARSER_REGEX_ONLY: ${PARSER_REGEX_ONLY:-false}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-300}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-8192}
      OLLAMA_MAX_TEXT_CHARS: ${OLLAMA_MAX_TEXT_CHARS:-12000}
      VLLM_BASE_URL: ${VLLM_BASE_URL:-http://vllm:8000}
      VLLM_MODEL: ${VLLM_MODEL:-Qwen/Qwen2.5-14B-Instruct-AWQ}
      VLLM_TIMEOUT_SECONDS: ${VLLM_TIMEOUT_SECONDS:-180}
    depends_on:
      ollama:
        condition: service_started
      ollama-init:
        condition: service_completed_successfully

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend

volumes:
  pgdata:
  minio-data:
  vllm-cache:
  ollama-data:
