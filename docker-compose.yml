services:
  db:
    image: postgres:16.11-alpine3.23
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:-quro_admin}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_admin_password
      POSTGRES_DB: ${POSTGRES_DB:-quro}
    secrets:
      - postgres_admin_password
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - backend-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-quro_root}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        export MINIO_ROOT_PASSWORD="$$(tr -d '\r\n' < /run/secrets/minio_root_password)"
        exec minio server /data --console-address ":9001"
    secrets:
      - minio_root_password
    volumes:
      - ./data/minio:/data
    networks:
      - backend-net
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio-init:
    build:
      context: .
      dockerfile: docker/minio-init/Dockerfile
    restart: 'no'
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-quro_root}
      MINIO_APP_USER: ${MINIO_APP_USER:-quro_app}
      S3_BUCKET: ${S3_BUCKET:-quro-documents}
    secrets:
      - minio_root_password
      - minio_app_secret_key
    networks:
      - backend-net

  migrate:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    restart: 'no'
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quro}
      POSTGRES_ADMIN_USER: ${POSTGRES_ADMIN_USER:-quro_admin}
      POSTGRES_APP_USER: ${POSTGRES_APP_USER:-quro_app}
    secrets:
      - postgres_admin_password
      - postgres_app_password
    entrypoint: ['/bin/sh', '/app/docker/backend/run-migrate.sh']
    networks:
      - backend-net

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quro}
      POSTGRES_APP_USER: ${POSTGRES_APP_USER:-quro_app}
      MINIO_APP_USER: ${MINIO_APP_USER:-quro_app}
      PORT: '3000'
      SECURE_COOKIES: ${SECURE_COOKIES:-false}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost,http://localhost:5173}
      S3_ENDPOINT: ${S3_INTERNAL_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-eu-west-1}
      S3_BUCKET: ${S3_BUCKET:-quro-documents}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      PENSION_PARSER_URL: ${PENSION_PARSER_INTERNAL_URL:-http://pension-parser:8080}
      PENSION_PARSER_TIMEOUT_MS: ${PENSION_PARSER_TIMEOUT_MS:-300000}
      IMPORT_DRAFT_TTL_DAYS: ${IMPORT_DRAFT_TTL_DAYS:-7}
      IMPORT_WORKER_POLL_INTERVAL_MS: ${IMPORT_WORKER_POLL_INTERVAL_MS:-3000}
    secrets:
      - postgres_app_password
      - minio_app_secret_key
      - marketstack_api_key
      - hugging_face_hub_token
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    entrypoint: ['/bin/sh', '/app/docker/backend/with-runtime-env.sh']
    command: ['bun', 'run', 'start']
    networks:
      - frontend-net
      - backend-net

  pension-import-worker:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    profiles: ['pension-import']
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quro}
      POSTGRES_APP_USER: ${POSTGRES_APP_USER:-quro_app}
      MINIO_APP_USER: ${MINIO_APP_USER:-quro_app}
      S3_ENDPOINT: ${S3_INTERNAL_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-eu-west-1}
      S3_BUCKET: ${S3_BUCKET:-quro-documents}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      PENSION_PARSER_URL: ${PENSION_PARSER_INTERNAL_URL:-http://pension-parser:8080}
      PENSION_PARSER_TIMEOUT_MS: ${PENSION_PARSER_TIMEOUT_MS:-300000}
      IMPORT_DRAFT_TTL_DAYS: ${IMPORT_DRAFT_TTL_DAYS:-7}
      IMPORT_WORKER_POLL_INTERVAL_MS: ${IMPORT_WORKER_POLL_INTERVAL_MS:-3000}
    secrets:
      - postgres_app_password
      - minio_app_secret_key
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      pension-parser:
        condition: service_started
    entrypoint: ['/bin/sh', '/app/docker/backend/with-runtime-env.sh']
    command: ['bun', 'run', 'worker:pension-imports']
    networks:
      - backend-net
      - ai-net

  db-tools:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    profiles: ['maintenance']
    restart: 'no'
    stdin_open: true
    tty: true
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quro}
      POSTGRES_ADMIN_USER: ${POSTGRES_ADMIN_USER:-quro_admin}
      POSTGRES_APP_USER: ${POSTGRES_APP_USER:-quro_app}
    secrets:
      - postgres_admin_password
      - postgres_app_password
    volumes:
      - ./backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ['/bin/sh', '/app/docker/backend/run-db-tools.sh']
    networks:
      - backend-net

  vllm:
    build:
      context: .
      dockerfile: docker/vllm/Dockerfile
    profiles: ['pension-import']
    restart: unless-stopped
    command:
      - --model
      - ${VLLM_MODEL:-Qwen/Qwen2.5-14B-Instruct-AWQ}
      - --host
      - 0.0.0.0
      - --port
      - '8000'
      - --gpu-memory-utilization
      - ${VLLM_GPU_MEMORY_UTILIZATION:-0.92}
      - --max-model-len
      - ${VLLM_MAX_MODEL_LEN:-8192}
    secrets:
      - hugging_face_hub_token
    volumes:
      - ./data/vllm-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - ai-net

  pension-parser:
    build:
      context: .
      dockerfile: services/pension-parser/Dockerfile
    profiles: ['pension-import']
    restart: unless-stopped
    environment:
      PARSER_ALLOW_REGEX_FALLBACK: ${PARSER_ALLOW_REGEX_FALLBACK:-true}
      PARSER_REGEX_ONLY: ${PARSER_REGEX_ONLY:-false}
      VLLM_BASE_URL: ${VLLM_INTERNAL_BASE_URL:-http://vllm:8000}
      VLLM_MODEL: ${VLLM_MODEL:-Qwen/Qwen2.5-14B-Instruct-AWQ}
      VLLM_TIMEOUT_SECONDS: ${VLLM_TIMEOUT_SECONDS:-180}
    depends_on:
      vllm:
        condition: service_started
    networks:
      - ai-net

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    restart: unless-stopped
    ports:
      - '${QRO_FRONTEND_PORT:-80}:80'
    depends_on:
      backend:
        condition: service_started
    networks:
      - frontend-net

networks:
  frontend-net:
  backend-net:
  ai-net:

secrets:
  postgres_admin_password:
    file: ./secrets/postgres_admin_password.txt
  postgres_app_password:
    file: ./secrets/postgres_app_password.txt
  minio_root_password:
    file: ./secrets/minio_root_password.txt
  minio_app_secret_key:
    file: ./secrets/minio_app_secret_key.txt
  marketstack_api_key:
    file: ./secrets/marketstack_api_key.txt
  hugging_face_hub_token:
    file: ./secrets/hugging_face_hub_token.txt
