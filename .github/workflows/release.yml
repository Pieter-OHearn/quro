name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    name: Prepare Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d ' \n')
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Ensure tag is unique
        run: |
          if git rev-parse --verify --quiet ${{ steps.version.outputs.value }}; then
            echo "Tag ${{ steps.version.outputs.value }} already exists" >&2
            exit 1
          fi
      - name: Create git tag
        run: |
          git tag ${{ steps.version.outputs.value }}
          git push origin ${{ steps.version.outputs.value }}

  build-images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: prepare
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      REGISTRY: ghcr.io/${{ github.repository_owner }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build backend image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file packages/backend/Dockerfile \
            --tag "$REGISTRY/quro-backend:$VERSION" \
            --tag "$REGISTRY/quro-backend:latest" \
            --push .
      - name: Build frontend image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file packages/frontend/Dockerfile \
            --tag "$REGISTRY/quro-frontend:$VERSION" \
            --tag "$REGISTRY/quro-frontend:latest" \
            --push .

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [prepare, build-images]
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      REGISTRY: ghcr.io/${{ github.repository_owner }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Extract release notes
        run: |
          bun scripts/read-changelog-section.ts "$VERSION" > release-notes.md
      - name: Install envsubst
        run: sudo apt-get update && sudo apt-get install -y gettext-base
      - name: Generate release manifest
        run: |
          FRONTEND_IMAGE="$REGISTRY/quro-frontend" \
          BACKEND_IMAGE="$REGISTRY/quro-backend" \
          VERSION="$VERSION" \
          envsubst < deploy/docker-compose.release.template.yml > docker-compose.release.yml
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          body_path: release-notes.md
          files: docker-compose.release.yml
