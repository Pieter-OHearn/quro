name: Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to release'
        required: true
        default: 'main'

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    name: Prepare Tag
    runs-on: ubuntu-latest
    env:
      RELEASE_REF: ${{ inputs.ref || 'main' }}
    outputs:
      version: ${{ steps.version.outputs.value }}
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_REF }}
          fetch-depth: 0
      - name: Capture release commit
        id: commit
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d ' \n')
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Ensure tag is unique
        run: |
          if git rev-parse --verify --quiet ${{ steps.version.outputs.value }}; then
            echo "Tag ${{ steps.version.outputs.value }} already exists" >&2
            exit 1
          fi
      - name: Create git tag
        run: |
          git tag ${{ steps.version.outputs.value }}
          git push origin ${{ steps.version.outputs.value }}

  build-images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: prepare
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      REGISTRY_OWNER: ${{ github.repository_owner }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}
      - name: Normalize registry owner
        run: |
          OWNER_LC=$(printf '%s' "$REGISTRY_OWNER" | tr '[:upper:]' '[:lower:]')
          {
            echo "REGISTRY_OWNER_LC=$OWNER_LC"
            echo "REGISTRY=ghcr.io/$OWNER_LC"
          } >> "$GITHUB_ENV"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build backend image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file packages/backend/Dockerfile \
            --tag "$REGISTRY/quro-backend:$VERSION" \
            --tag "$REGISTRY/quro-backend:latest" \
            --push .
      - name: Build frontend image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file packages/frontend/Dockerfile \
            --tag "$REGISTRY/quro-frontend:$VERSION" \
            --tag "$REGISTRY/quro-frontend:latest" \
            --push .
      - name: Build release webhook image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file deploy/release-webhook/Dockerfile \
            --tag "$REGISTRY/quro-release-webhook:$VERSION" \
            --tag "$REGISTRY/quro-release-webhook:latest" \
            --push .

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [prepare, build-images]
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      REGISTRY_OWNER: ${{ github.repository_owner }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}
      - name: Normalize registry owner
        run: |
          OWNER_LC=$(printf '%s' "$REGISTRY_OWNER" | tr '[:upper:]' '[:lower:]')
          {
            echo "REGISTRY_OWNER_LC=$OWNER_LC"
            echo "REGISTRY=ghcr.io/$OWNER_LC"
          } >> "$GITHUB_ENV"
      - uses: oven-sh/setup-bun@v2
      - name: Extract release notes
        run: |
          bun scripts/read-changelog-section.ts "$VERSION" > release-notes.md
      - name: Install envsubst
        run: sudo apt-get update && sudo apt-get install -y gettext-base
      - name: Generate release manifest
        run: |
          FRONTEND_IMAGE="$REGISTRY/quro-frontend" \
          BACKEND_IMAGE="$REGISTRY/quro-backend" \
          WEBHOOK_IMAGE="$REGISTRY/quro-release-webhook" \
          VERSION="$VERSION" \
          envsubst < deploy/docker-compose.release.template.yml > docker-compose.release.yml
      - name: Build auto-update bundle
        run: |
          bun build scripts/auto-update/fetch-release.ts \
            --outfile scripts/auto-update/fetch-release.js \
            --target node --format esm
          BUNDLE_DIR="auto-update-bundle"
          rm -rf "$BUNDLE_DIR"
          mkdir -p "$BUNDLE_DIR/deploy/auto-update"
          mkdir -p "$BUNDLE_DIR/scripts/auto-update"
          mkdir -p "$BUNDLE_DIR/secrets"
          cp docker-compose.release.yml "$BUNDLE_DIR/"
          cp deploy/auto-update/apply-release.sh "$BUNDLE_DIR/deploy/auto-update/"
          cp scripts/auto-update/fetch-release.js "$BUNDLE_DIR/scripts/auto-update/"
          cp docs/device-auto-update-webhook.md "$BUNDLE_DIR/README.md"
          cp .env.example "$BUNDLE_DIR/.env.template"
          cp secrets/*.example "$BUNDLE_DIR/secrets/" || true
          tar -czf "auto-update-bundle-${VERSION}.tar.gz" -C "$BUNDLE_DIR" .
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          body_path: release-notes.md
          files: |
            docker-compose.release.yml
            auto-update-bundle-${{ env.VERSION }}.tar.gz
