name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  # ── JavaScript / TypeScript ──────────────────────────────────────────────

  format:
    name: Prettier Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Check formatting
        run: bun run check:format

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run linter
        run: bun run check:lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run typecheck
        run: bun run check:typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: quro
          POSTGRES_PASSWORD: quro
          POSTGRES_DB: quro
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U quro -d quro"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://quro:quro@127.0.0.1:5432/quro
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run database migrations
        run: bun run db:migrate
      - name: Run tests
        run: bun run check:test

  smoke:
    name: Browser Smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: quro
          POSTGRES_PASSWORD: quro
          POSTGRES_DB: quro
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U quro -d quro"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://quro:quro@127.0.0.1:5432/quro
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium
      - name: Run browser smoke suite
        run: bun run test:smoke

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [format, lint, typecheck, test, smoke]
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run check:build

  # ── Python / AI Worker ───────────────────────────────────────────────────

  python-format:
    name: Python Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install ruff
        run: pip install ruff
      - name: Check formatting
        run: ruff format --check services/pension-parser/

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install ruff
        run: pip install ruff
      - name: Run linter
        run: ruff check services/pension-parser/

  build-worker:
    name: Build Worker (pension-parser)
    runs-on: ubuntu-latest
    needs: [python-format, python-lint]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r services/pension-parser/requirements.txt
      - name: Compile check
        run: python -m compileall services/pension-parser/app/

  # ── Security ─────────────────────────────────────────────────────────────

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install JS dependencies
        run: bun install --frozen-lockfile
      - name: Bun audit
        run: bun run check:security:js
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Python security audit
        run: pip-audit -r services/pension-parser/requirements.txt

  ci:
    name: CI
    runs-on: ubuntu-latest
    needs: [build, build-worker, security]
    steps:
      - run: echo "All checks passed"
