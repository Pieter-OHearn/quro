# This template is transformed into a version-pinned manifest and attached to each GitHub Release.
# Placeholders resolved via envsubst inside the release workflow:
#   ${FRONTEND_IMAGE} – fully qualified GHCR image for the frontend (no tag)
#   ${BACKEND_IMAGE}  – fully qualified GHCR image for the backend (no tag)
#   ${VERSION}        – semantic version string (e.g., v1.2.3)

services:
  frontend:
    image: '${FRONTEND_IMAGE}:${VERSION}'
    restart: unless-stopped
    ports:
      - '${QRO_FRONTEND_PORT:-80}:80'
    environment:
      - QRO_API_URL=http://backend:3000
    depends_on:
      backend:
        condition: service_started
    networks:
      - frontend-net

  backend:
    image: '${BACKEND_IMAGE}:${VERSION}'
    restart: unless-stopped
    environment:
      - PORT=3000
      - POSTGRES_DB=${POSTGRES_DB:-quro}
      - POSTGRES_APP_USER=${POSTGRES_APP_USER:-quro_app}
      - MINIO_APP_USER=${MINIO_APP_USER:-quro_app}
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET=${S3_BUCKET:-quro-documents}
      - S3_REGION=${S3_REGION:-eu-west-1}
      - S3_FORCE_PATH_STYLE=true
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    secrets:
      - postgres_app_password
      - minio_app_secret_key
    networks:
      - frontend-net
      - backend-net

  db:
    image: postgres:16.11-alpine3.23
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_ADMIN_USER:-quro_admin}
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_admin_password
      - POSTGRES_DB=${POSTGRES_DB:-quro}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10
    secrets:
      - postgres_admin_password
    networks:
      - backend-net

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-quro_root}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        export MINIO_ROOT_PASSWORD="$$(tr -d '\r\n' < /run/secrets/minio_root_password)"
        exec minio server /data --console-address ":9001"
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    secrets:
      - minio_root_password
    networks:
      - backend-net

  auto-updater:
    image: '${AUTO_UPDATER_IMAGE}:${VERSION}'
    profiles: ['auto-update']
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - STACK_DIR=${STACK_DIR:-/stack}
      - STACK_COMPOSE_FILE=${STACK_COMPOSE_FILE:-docker-compose.release.yml}
      - APPLY_RELEASE_SCRIPT=${APPLY_RELEASE_SCRIPT:-/stack/deploy/auto-update/apply-release.sh}
      - POLL_INTERVAL=${POLL_INTERVAL:-3600}
    volumes:
      - ./:/stack
      - /var/run/docker.sock:/var/run/docker.sock

secrets:
  minio_app_secret_key:
    file: ./secrets/minio_app_secret_key.txt
  minio_root_password:
    file: ./secrets/minio_root_password.txt
  postgres_admin_password:
    file: ./secrets/postgres_admin_password.txt
  postgres_app_password:
    file: ./secrets/postgres_app_password.txt

networks:
  frontend-net:
  backend-net:
